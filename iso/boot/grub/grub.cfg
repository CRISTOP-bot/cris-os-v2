set timeout=10
set default=0

insmod all_video
insmod theme

set gfxmode=auto
set gfxpayload=text
set theme=/boot/grub/theme.txt

menuentry "NucleOS (Boot)" {
  multiboot /boot/kernel.bin
  module  /boot/rootfs.bin rootfs
  boot
}

menuentry "NucleOS (Install — info)" {
  echo "────────────────────────────────────────────────"
  echo "  Para INSTALAR NucleOS en tu disco duro:"
  echo ""
  echo "  1. Arranca desde un Linux Live USB"
  echo "  2. Monta este USB:  mount /dev/sdX1 /mnt"
  echo "  3. Ejecuta:         sudo python /mnt/installer/nucleos-install"
  echo "────────────────────────────────────────────────"
  echo ""
  echo "Presiona cualquier tecla para reiniciar..."
  boot
}

menuentry "Reiniciar" {
  reboot
}

menuentry "Apagar" {
  halt
}
